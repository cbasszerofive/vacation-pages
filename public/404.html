<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages 404 → SPA redirect: preserve the path via ?path=
    const path = window.location.pathname.replace('/vacation-pages', '') || '/';
    const search = window.location.search;
    const hash = window.location.hash;
    window.location.replace(
      '/vacation-pages/?path=' + encodeURIComponent(path + search) + hash
    );
  </script>
</head>
<body></body>
</html>
